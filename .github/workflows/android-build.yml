name: Android Build

on:
  push:
    branches: ["master", "main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_PLATFORM: "android-35"
      ANDROID_BUILD_TOOLS: "34.0.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure Gradle wrapper executable
        run: chmod +x gradlew

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install pinned Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;${ANDROID_PLATFORM}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Prepare pre-release signing keystore
        if: github.event_name == 'push' && (github.ref_name == 'master' || github.ref_name == 'main')
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          if [ -z "${ANDROID_UPLOAD_KEYSTORE_BASE64}" ] || [ -z "${ANDROID_UPLOAD_KEYSTORE_PASSWORD}" ] || [ -z "${ANDROID_UPLOAD_KEY_ALIAS}" ] || [ -z "${ANDROID_UPLOAD_KEY_PASSWORD}" ]; then
            echo "Release signing secrets are required for installable pre-release APK"
            exit 1
          fi

          mkdir -p keystore
          echo "${ANDROID_UPLOAD_KEYSTORE_BASE64}" | base64 --decode > keystore/upload.jks
          {
            echo "ANDROID_UPLOAD_KEYSTORE_PATH=${GITHUB_WORKSPACE}/keystore/upload.jks"
            echo "ANDROID_UPLOAD_KEYSTORE_PASSWORD=${ANDROID_UPLOAD_KEYSTORE_PASSWORD}"
            echo "ANDROID_UPLOAD_KEY_ALIAS=${ANDROID_UPLOAD_KEY_ALIAS}"
            echo "ANDROID_UPLOAD_KEY_PASSWORD=${ANDROID_UPLOAD_KEY_PASSWORD}"
          } >> "${GITHUB_ENV}"

      - name: Build debug + release artifacts
        run: ./gradlew --no-daemon assembleDebug assembleRelease bundleRelease

      - name: Normalize artifact filenames
        run: |
          mkdir -p dist
          release_apk_signed="app/build/outputs/apk/release/app-release.apk"
          release_apk_unsigned="app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "${release_apk_signed}" ]; then
            echo "Using signed release APK"
            release_apk="${release_apk_signed}"
          elif [ -f "${release_apk_unsigned}" ]; then
            if [ "${GITHUB_EVENT_NAME}" = "push" ] && { [ "${GITHUB_REF_NAME}" = "master" ] || [ "${GITHUB_REF_NAME}" = "main" ]; }; then
              echo "Unsigned release APK detected on push build; pre-release requires signed release APK."
              exit 1
            fi
            echo "Using unsigned release APK"
            release_apk="${release_apk_unsigned}"
          else
            echo "Release APK not found at signed or unsigned expected paths."
            exit 1
          fi
          cp "app/build/outputs/apk/debug/app-debug.apk" "dist/ruNNNpe bridge-debug.apk"
          cp "${release_apk}" "dist/ruNNNpe bridge-release.apk"
          cp "app/build/outputs/bundle/release/app-release.aab" "dist/ruNNNpe bridge-release.aab"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ruNNNpe bridge build artifacts
          path: dist/*
          if-no-files-found: error

      - name: Build pre-release notes
        if: github.event_name == 'push' && (github.ref_name == 'master' || github.ref_name == 'main')
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          notes_file="dist/pre-release-notes.md"
          {
            echo "## What to install"
            echo "- ruNNNpe bridge-release.apk - install this for normal testing (closest to production behavior)."
            echo "- ruNNNpe bridge-debug.apk - developer/debug build (use only if you need debug-specific diagnostics)."
            echo "- ruNNNpe bridge-release.aab - Play Console upload artifact, not for direct phone install."
            echo ""
            echo "## Change history"
          } > "${notes_file}"

          if [ -n "${BEFORE_SHA}" ] && [ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ] && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            if git log --oneline "${BEFORE_SHA}..${GITHUB_SHA}" | grep -q .; then
              git log --pretty=format:'- `%h` %s' "${BEFORE_SHA}..${GITHUB_SHA}" >> "${notes_file}"
            else
              echo "- No commit delta detected in this push." >> "${notes_file}"
            fi
          else
            git log -10 --pretty=format:'- `%h` %s' >> "${notes_file}"
          fi

      - name: Publish rolling pre-release
        if: github.event_name == 'push' && (github.ref_name == 'master' || github.ref_name == 'main')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view pre-release >/dev/null 2>&1; then
            gh release view pre-release --json body --jq .body > dist/pre-release-existing-notes.md

            python - <<'PY'
            from pathlib import Path

            marker = "## Change history"
            current = Path("dist/pre-release-notes.md").read_text(encoding="utf-8")
            existing = Path("dist/pre-release-existing-notes.md").read_text(encoding="utf-8")

            def split_sections(text: str):
                if marker not in text:
                    return text.strip(), []
                before, after = text.split(marker, 1)
                lines = [line.strip() for line in after.strip().splitlines() if line.strip()]
                return before.rstrip(), lines

            current_intro, current_history = split_sections(current)
            _, existing_history = split_sections(existing)

            merged = []
            seen = set()
            for line in current_history + existing_history:
                if line in seen:
                    continue
                seen.add(line)
                merged.append(line)

            output = current_intro + "\n\n" + marker + "\n"
            output += "\n".join(merged) if merged else "- No changes recorded."
            output += "\n"
            Path("dist/pre-release-notes-merged.md").write_text(output, encoding="utf-8")
            PY

            gh release edit pre-release \
              --title "pre-release" \
              --target "${GITHUB_SHA}" \
              --notes-file "dist/pre-release-notes-merged.md" \
              --prerelease
            gh release upload pre-release dist/*.apk dist/*.aab --clobber
          else
            gh release create pre-release dist/*.apk dist/*.aab \
              --target "${GITHUB_SHA}" \
              --title "pre-release" \
              --notes-file "dist/pre-release-notes.md" \
              --prerelease
          fi
