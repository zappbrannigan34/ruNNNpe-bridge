name: Android Build

on:
  push:
    branches: ["master", "main"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug + release artifacts
        env:
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: ci-${{ github.run_number }}
        run: .\gradlew.bat assembleDebug assembleRelease bundleRelease

      - name: Normalize artifact filenames
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $releaseApkSigned = "app/build/outputs/apk/release/app-release.apk"
          $releaseApkUnsigned = "app/build/outputs/apk/release/app-release-unsigned.apk"
          if (Test-Path $releaseApkSigned) {
            $releaseApk = $releaseApkSigned
          } elseif (Test-Path $releaseApkUnsigned) {
            $releaseApk = $releaseApkUnsigned
          } else {
            throw "Release APK not found at signed or unsigned expected paths."
          }
          Copy-Item "app/build/outputs/apk/debug/app-debug.apk" "dist/ruNNNpe bridge-debug.apk" -Force
          Copy-Item $releaseApk "dist/ruNNNpe bridge-release.apk" -Force
          Copy-Item "app/build/outputs/bundle/release/app-release.aab" "dist/ruNNNpe bridge-release.aab" -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ruNNNpe bridge build artifacts
          path: dist/*
          if-no-files-found: error
