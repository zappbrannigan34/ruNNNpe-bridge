name: Release Prep

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "Release Prep must run on master"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare release files
        id: prepare
        run: |
          python tools/release_prepare.py --bump "${{ inputs.bump }}" --github-output "$GITHUB_OUTPUT"

      - name: Commit release prep changes
        run: |
          if git diff --quiet; then
            echo "No changes produced by release prep"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts .fdroid.yml
          git commit -m "Prepare release v${{ steps.prepare.outputs.version_name }}"

      - name: Create release tag
        run: |
          tag="${{ steps.prepare.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
            exit 1
          fi
          git tag -a "$tag" -m "$tag"

      - name: Push commit and tag
        run: |
          git push origin master
          git push origin "${{ steps.prepare.outputs.tag }}"
