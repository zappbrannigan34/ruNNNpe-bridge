name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag for release (example: v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Resolve release tag
        id: tag
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag_name }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          "value=$tag" >> $env:GITHUB_OUTPUT
          "version_name=$($tag.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      - name: Prepare upload keystore
        if: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 != '' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path keystore -Force | Out-Null
          [System.IO.File]::WriteAllBytes(
            "keystore/upload.jks",
            [System.Convert]::FromBase64String("${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}")
          )

      - name: Build release APK and AAB
        env:
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: ${{ steps.tag.outputs.version_name }}
          ANDROID_UPLOAD_KEYSTORE_PATH: ${{ github.workspace }}\keystore\upload.jks
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: .\gradlew.bat clean assembleRelease bundleRelease

      - name: Prepare release artifact filenames
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $tag = "${{ steps.tag.outputs.value }}"
          Copy-Item "app/build/outputs/apk/release/app-release.apk" "dist/ruNNNpe bridge-$tag.apk" -Force
          Copy-Item "app/build/outputs/bundle/release/app-release.aab" "dist/ruNNNpe bridge-$tag.aab" -Force

      - name: Publish GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: |
            dist/*.apk
            dist/*.aab
