name: Publish APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag for release (example: v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: .\gradlew.bat assembleDebug

      - name: Resolve release tag
        id: tag
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "value=${{ inputs.tag_name }}" >> $env:GITHUB_OUTPUT
          } else {
            "value=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Prepare release APK filename
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $tag = "${{ steps.tag.outputs.value }}"
          Copy-Item "app/build/outputs/apk/debug/app-debug.apk" "dist/ruNNNpe bridge-$tag.apk" -Force

      - name: Publish GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: dist/*.apk
