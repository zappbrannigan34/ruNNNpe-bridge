name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ANDROID_PLATFORM: "android-35"
      ANDROID_BUILD_TOOLS: "34.0.0"

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure Gradle wrapper executable
        run: chmod +x gradlew

      - name: Validate tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match v<major>.<minor>.<patch>"
            exit 1
          fi

      - name: Validate version files match tag
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import sys

          tag = os.environ["GITHUB_REF_NAME"]
          expected = tag[1:]

          gradle = pathlib.Path("app/build.gradle.kts").read_text(encoding="utf-8")
          fdroid = pathlib.Path(".fdroid.yml").read_text(encoding="utf-8")

          gradle_match = re.search(r'^\s*versionName\s*=\s*"([^\"]+)"\s*$', gradle, flags=re.MULTILINE)
          fdroid_match = re.search(r'^CurrentVersion:\s+(.+)$', fdroid, flags=re.MULTILINE)

          if not gradle_match or not fdroid_match:
              print("Unable to parse version fields", file=sys.stderr)
              raise SystemExit(1)

          gradle_version = gradle_match.group(1).strip()
          fdroid_version = fdroid_match.group(1).strip()

          if gradle_version != expected or fdroid_version != expected:
              print(
                  f"Version mismatch: tag={expected}, gradle={gradle_version}, fdroid={fdroid_version}",
                  file=sys.stderr,
              )
              raise SystemExit(1)
          PY

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install pinned Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;${ANDROID_PLATFORM}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Prepare upload keystore
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${ANDROID_UPLOAD_KEYSTORE_BASE64}" ]; then
            echo "ANDROID_UPLOAD_KEYSTORE_BASE64 secret is required for release publish"
            exit 1
          fi
          mkdir -p keystore
          echo "${ANDROID_UPLOAD_KEYSTORE_BASE64}" | base64 --decode > keystore/upload.jks

      - name: Build release APK and AAB
        env:
          ANDROID_UPLOAD_KEYSTORE_PATH: ${{ github.workspace }}/keystore/upload.jks
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          if [ -z "${ANDROID_UPLOAD_KEYSTORE_PASSWORD}" ] || [ -z "${ANDROID_UPLOAD_KEY_ALIAS}" ] || [ -z "${ANDROID_UPLOAD_KEY_PASSWORD}" ]; then
            echo "Release signing secrets are required"
            exit 1
          fi
          ./gradlew --no-daemon clean assembleRelease bundleRelease

      - name: Prepare release artifact filenames
        run: |
          mkdir -p dist
          tag="${GITHUB_REF_NAME}"
          release_apk_signed="app/build/outputs/apk/release/app-release.apk"
          release_apk_unsigned="app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "${release_apk_signed}" ]; then
            release_apk="${release_apk_signed}"
          elif [ -f "${release_apk_unsigned}" ]; then
            release_apk="${release_apk_unsigned}"
          else
            echo "Release APK not found at signed or unsigned expected paths."
            exit 1
          fi
          cp "${release_apk}" "dist/ruNNNpe bridge-${tag}.apk"
          cp "app/build/outputs/bundle/release/app-release.aab" "dist/ruNNNpe bridge-${tag}.aab"

      - name: Build release notes
        run: |
          notes_file="dist/release-notes.md"
          tag="${GITHUB_REF_NAME}"
          {
            echo "## What to install"
            echo "- ruNNNpe bridge-${tag}.apk - installable Android package for production-like testing and user installs."
            echo "- ruNNNpe bridge-${tag}.aab - Play Console upload artifact, not for direct phone install."
            echo ""
            echo "## Change history"
          } > "${notes_file}"

          previous_tag=$(git tag --list 'v*' --sort=-version:refname | grep -Fxv "${tag}" | head -n 1)
          if [ -n "${previous_tag}" ] && git rev-parse "${previous_tag}" >/dev/null 2>&1; then
            if git log --oneline "${previous_tag}..${tag}" | grep -q .; then
              git log --pretty=format:'- `%h` %s' "${previous_tag}..${tag}" >> "${notes_file}"
            else
              echo "- No changes detected between ${previous_tag} and ${tag}." >> "${notes_file}"
            fi
            echo "" >> "${notes_file}"
            echo "_Range: ${previous_tag}..${tag}_" >> "${notes_file}"
          else
            git log -10 --pretty=format:'- `%h` %s' >> "${notes_file}"
            echo "" >> "${notes_file}"
            echo "_Range: latest 10 commits_" >> "${notes_file}"
          fi

      - name: Publish GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --title "${tag}" --notes-file "dist/release-notes.md"
            gh release upload "${tag}" dist/*.apk dist/*.aab --clobber
          else
            gh release create "${tag}" dist/*.apk dist/*.aab \
              --title "${tag}" \
              --notes-file "dist/release-notes.md"
          fi
